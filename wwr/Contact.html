<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <header>
        <img src="image/wwr.png" alt="Rafting Company Logo" class="logo">
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="Contact.html">Contact US</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <div class="information">
            <h3>Contact Us</h3><br>
            <h3>Rafting Company</h3>
            <p class="contact1">Phone Number: <a href="phone">+261341002693</a></p>
            <p class="contact1">Email: <a href="gmail.com">Rafting Company@gmail.com</a></p>
        </div>
        <div class="map">
            <h3>Our Location</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4675.767364175442!2d47.028268826156726!3d-19.86785743637833!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x21e50f06d7cce0f7%3A0x5c8391d28ef98ffc!2sPiscine%20Andranomafana!5e1!3m2!1sfr!2smg!4v1755146970375!5m2!1sfr!2smg" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe> 
        </div>
        </div>
        <div class="image1">
            <figure><img src="image/person1 (1).jpg" alt="smiling man" ><figcaption>I like this Job</figcaption></figure>
            <figure><img src="image/person1 (2).jpg" alt="smiling man" ><figcaption>I'm so happy to be here </figcaption></figure>
            <figure><img src="image/person1 (3).jpg" alt="smiling man" ><figcaption>I never enjoyed so much in my life</figcaption></figure>
        </div>
        <form action="" method="get">
            <fieldset class="fieldset1">
               <legend>Contact Information</legend>
               <div class="form1">
                 <label for="name">Name </label>
                 <input type="text" name="name" id="name" placeholder="your name" required />
               </div>
              <div class="form1">
                <label for="email">Email </label>
                <input type="email" name="email" id="email" placeholder="your emai" required />
              </div>
            </fieldset>
            <fieldset class="fieldset2">
                <legend>Send Us A Message</legend>
                <div class="form2">
                <label>Purpose of the message</label>
                <div class="radio-group">
                    <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
                    <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
                </div>
                <div class="message">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Enter your massage..." required></textarea>
                </div>
                <div class="checkbox">
                <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label>
                 </div>
            </fieldset>
              <div class="submit">
                <input type="submit" value="Subscribe!"  />
              </div>
        </form>
    </main>
    <footer class="socialmedia">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        <nav>
            <a href="http://facebook.com"><img src="image/fb.png" alt="Facebook" width="40px" height="40px"> facebook</a>

            <a href="http://instagram.com"><img src="image/insta.png" alt="instagram" width="40px" height="40px">instagram</a>
        </nav>
    </footer>
</body>
</html>
