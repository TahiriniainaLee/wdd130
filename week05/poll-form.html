<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/poll-form.css">
    <title>WDD130 | Html Form - User Poll</title>
</head>
<body>
    <header>
        <h1>WDD130 | TAHIRINIAINA Andrianaivo | Html Form - User Poll</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                      <label for="fullname">Full Name :</label>
                      <input type="text" id="fullname" name="fullname"> 
                </div>
                      <div class="form-item column2"> <label for="useremail">Email :</label>
                      <input type="email" name="useremail" id="useremail">
                </div>            
            </fieldset>
            <fieldset>
                <legend>Question</legend>
                <div class="form-item column1">                
                   <label for="broswer">What is your favorite broswer ?</label>
                   <select name="broswer" id="broswer">
                        <option value="chrome">Chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="safari">Safari</option>
                        <option value="edge">Edge</option>
                        <option value="brave">Brave</option>
                        <option value="other">Other</option>
                   </select>
                </div>
                <div class="form-item column1">
                        <label for="pet">Do you have a household pet ?</label>
                        <input type="checkbox" name="pet" id="pet">
                </div>
                <label for="feedback">List the places you have lived :</label>
                <textarea name="feedback" id="feedback" rows="4" placeholder="Stillwater Florida , Amsterdam Neverland ,Tibuktu Mali" ></textarea>
            </fieldset>    
            <button type="submit">Submit Poll</button>
        </form>
    </main>
    <footer>
        <p>©️2025 | Html Form - User Poll Activity | TAHIRINIAINA Andrianaivo</p>
    </footer>
</body>
</html>
